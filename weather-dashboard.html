<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .weather-container { max-width: 600px; margin: 0 auto; }
        .weather-card { border: 1px solid #ccc; padding: 16px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="weather-container">
        <h1>Weather Dashboard</h1>
        <input type="text" id="city-input" placeholder="Enter city name" />
        <button id="fetch-weather">Get Weather</button>
        <div id="weather-display"></div>
    </div>

    <script>
        const apiKey = 'YOUR_OPENWEATHERMAP_API_KEY'; // Replace with your API key
        document.getElementById('fetch-weather').addEventListener('click', function() {
            const city = document.getElementById('city-input').value;
            if (city) {
                fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.cod === 200) {
                            document.getElementById('weather-display').innerHTML = `
                                <div class="weather-card">
                                    <h2>Weather in ${data.name}</h2>
                                    <p>Temperature: ${data.main.temp} °C</p>
                                    <p>Weather: ${data.weather[0].description}</p>
                                    <p>Humidity: ${data.main.humidity} %</p>
                                </div>
                            `;
                        } else {
                            document.getElementById('weather-display').innerText = 'City not found. Please try again.';
                        }
                    })
                    .catch(error => console.error('Error fetching weather data:', error));
            }
        });
    </script>
</body>
</html>
